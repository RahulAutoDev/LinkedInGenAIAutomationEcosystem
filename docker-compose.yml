version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
    depends_on:
      api:
        condition: service_healthy
