version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_started
      qdrant:
        condition: service_started

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: linkedin
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: